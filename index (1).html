<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImmobilienRenditerechner</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #070f1a; }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.08); border-radius: 2px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
      background: #4fc3f7; cursor: pointer; box-shadow: 0 0 8px rgba(79,195,247,0.4);
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e3347; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const fmt = (n, decimals = 0) =>
      new Intl.NumberFormat("de-DE", { minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(n);
    const fmtEur = (n, decimals = 0) =>
      new Intl.NumberFormat("de-DE", { style: "currency", currency: "EUR", minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(n);
    const fmtPct = (n) => `${fmt(n, 2)} %`;

    const Slider = ({ label, value, min, max, step, unit, onChange, hint }) => (
      <div style={{ marginBottom: "18px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "4px" }}>
          <span style={{ fontSize: "12px", color: "#8a9bb0", letterSpacing: "0.06em", textTransform: "uppercase", fontFamily: "'DM Sans', sans-serif" }}>{label}</span>
          <span style={{ fontSize: "18px", fontWeight: "700", color: "#e8f4fd", fontFamily: "'DM Serif Display', serif" }}>
            {unit === "€" ? fmtEur(value) : unit === "%" ? fmtPct(value) : `${fmt(value)} ${unit}`}
          </span>
        </div>
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={e => onChange(parseFloat(e.target.value))}
          style={{ width: "100%", accentColor: "#4fc3f7", cursor: "pointer", height: "4px" }} />
        {hint && <p style={{ fontSize: "11px", color: "#5a6e82", margin: "3px 0 0 0" }}>{hint}</p>}
      </div>
    );

    const KPI = ({ label, value, sub, highlight, positive, negative }) => (
      <div style={{
        background: highlight ? "linear-gradient(135deg, #1a3a5c 0%, #0d2137 100%)" : "rgba(255,255,255,0.03)",
        border: `1px solid ${highlight ? "#4fc3f7" : "rgba(255,255,255,0.07)"}`,
        borderRadius: "12px", padding: "16px 20px",
        boxShadow: highlight ? "0 0 24px rgba(79,195,247,0.15)" : "none",
      }}>
        <div style={{ fontSize: "11px", color: "#8a9bb0", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "6px", fontFamily: "'DM Sans', sans-serif" }}>{label}</div>
        <div style={{ fontSize: highlight ? "26px" : "22px", fontWeight: "700", fontFamily: "'DM Serif Display', serif", color: positive ? "#4ade80" : negative ? "#f87171" : highlight ? "#4fc3f7" : "#e8f4fd" }}>{value}</div>
        {sub && <div style={{ fontSize: "11px", color: "#5a6e82", marginTop: "4px" }}>{sub}</div>}
      </div>
    );

    const Section = ({ title, icon, children, collapsible, defaultOpen = true }) => {
      const [open, setOpen] = useState(defaultOpen);
      return (
        <div style={{ marginBottom: "28px" }}>
          <div onClick={collapsible ? () => setOpen(!open) : undefined}
            style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: open ? "16px" : "8px", cursor: collapsible ? "pointer" : "default", userSelect: "none" }}>
            <span style={{ fontSize: "18px" }}>{icon}</span>
            <h3 style={{ margin: 0, fontSize: "13px", letterSpacing: "0.12em", textTransform: "uppercase", color: "#4fc3f7", fontFamily: "'DM Sans', sans-serif", fontWeight: "600" }}>{title}</h3>
            {collapsible && <span style={{ marginLeft: "auto", color: "#5a6e82", fontSize: "12px" }}>{open ? "▲" : "▼"}</span>}
          </div>
          {open && children}
        </div>
      );
    };

    const Toggle = ({ label, value, onChange }) => (
      <label style={{ display: "flex", alignItems: "center", gap: "12px", cursor: "pointer", marginBottom: "14px" }}>
        <div onClick={() => onChange(!value)} style={{ width: "40px", height: "22px", borderRadius: "11px", position: "relative", background: value ? "#4fc3f7" : "#1e3347", transition: "background 0.2s", border: "1px solid rgba(255,255,255,0.1)", flexShrink: 0 }}>
          <div style={{ position: "absolute", top: "2px", left: value ? "19px" : "2px", width: "16px", height: "16px", borderRadius: "50%", background: value ? "#0d2137" : "#4a5568", transition: "left 0.2s" }} />
        </div>
        <span style={{ fontSize: "13px", color: "#8a9bb0", fontFamily: "'DM Sans', sans-serif" }}>{label}</span>
      </label>
    );

    const Row = ({ label, value, sub, bold, accent }) => (
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
        <span style={{ fontSize: "13px", color: bold ? "#c8dce8" : "#6b7e8f", fontFamily: "'DM Sans', sans-serif" }}>{label}</span>
        <div style={{ textAlign: "right" }}>
          <span style={{ fontSize: "14px", fontWeight: bold ? "700" : "500", color: accent || (bold ? "#e8f4fd" : "#9ab0c4"), fontFamily: "'DM Serif Display', serif" }}>{value}</span>
          {sub && <div style={{ fontSize: "11px", color: "#5a6e82" }}>{sub}</div>}
        </div>
      </div>
    );

    function LineChart({ series, height = 200, yMin, yMax, years }) {
      const w = 600, h = height, pad = { top: 20, right: 16, bottom: 28, left: 68 };
      const innerW = w - pad.left - pad.right;
      const innerH = h - pad.top - pad.bottom;
      const allVals = series.flatMap(s => s.data);
      const minV = yMin !== undefined ? yMin : Math.min(0, ...allVals) * 1.15;
      const maxV = yMax !== undefined ? yMax : Math.max(...allVals) * 1.1;
      const range = maxV - minV || 1;
      const xScale = (i) => pad.left + (i / Math.max(years.length - 1, 1)) * innerW;
      const yScale = (v) => pad.top + innerH - ((v - minV) / range) * innerH;
      const yTicks = 5;
      return (
        <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: `${height}px` }}>
          {Array.from({ length: yTicks + 1 }, (_, i) => {
            const v = minV + (range / yTicks) * i;
            const y = yScale(v);
            return (
              <g key={i}>
                <line x1={pad.left} y1={y} x2={w - pad.right} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="1" />
                <text x={pad.left - 6} y={y + 4} textAnchor="end" fontSize="9" fill="#4a5f73">{fmtEur(v, 0).replace(/\s?€/, "")}</text>
              </g>
            );
          })}
          {minV < 0 && maxV > 0 && <line x1={pad.left} y1={yScale(0)} x2={w - pad.right} y2={yScale(0)} stroke="rgba(255,255,255,0.18)" strokeWidth="1" strokeDasharray="4,3" />}
          {years.map((yr, i) => {
            if (i % Math.ceil(years.length / 10) !== 0 && i !== years.length - 1) return null;
            return <text key={i} x={xScale(i)} y={h - 4} textAnchor="middle" fontSize="9" fill="#4a5f73">{yr}</text>;
          })}
          {series.map((s, si) => {
            const pts = s.data.map((v, i) => `${xScale(i)},${yScale(v)}`).join(" ");
            return (
              <g key={si}>
                <polyline points={pts} fill="none" stroke={s.color} strokeWidth="2" strokeLinejoin="round" strokeOpacity="0.9" />
                {s.data.map((v, i) => {
                  if (i % Math.ceil(years.length / 7) !== 0 && i !== s.data.length - 1) return null;
                  return <circle key={i} cx={xScale(i)} cy={yScale(v)} r="3" fill={s.color} />;
                })}
              </g>
            );
          })}
          {series.map((s, si) => (
            <g key={si} transform={`translate(${pad.left + si * 150}, ${pad.top - 4})`}>
              <line x1="0" y1="6" x2="14" y2="6" stroke={s.color} strokeWidth="2" />
              <text x="18" y="10" fontSize="9" fill={s.color}>{s.label}</text>
            </g>
          ))}
        </svg>
      );
    }

    function ImmobilienRechner() {
      const [activeTab, setActiveTab] = useState("uebersicht");
      const [kaufpreis, setKaufpreis] = useState(400000);
      const [grunderwerbsteuer, setGrunderwerbsteuer] = useState(3.5);
      const [notarkosten, setNotarkosten] = useState(1.5);
      const [maklercourtage, setMaklercourtage] = useState(3.57);
      const [wohnflaeche, setWohnflaeche] = useState(80);
      const [eigenkapital, setEigenkapital] = useState(100000);
      const [zinssatz, setZinssatz] = useState(3.8);
      const [tilgung, setTilgung] = useState(2.0);
      const [zinsbindung, setZinsbindung] = useState(15);
      const [kaltmiete, setKaltmiete] = useState(1400);
      const [mietausfallWagnis, setMietausfallWagnis] = useState(4);
      const [mietsteigerung, setMietsteigerung] = useState(2.0);
      const [verwaltungskosten, setVerwaltungskosten] = useState(30);
      const [instandhaltung, setInstandhaltung] = useState(8);
      const [nichtUmlegbar, setNichtUmlegbar] = useState(150);
      const [isNeubau, setIsNeubau] = useState(false);
      const [isQNG, setIsQNG] = useState(false);
      const [gebaeudewertAnteil, setGebaeudewertAnteil] = useState(70);
      const [steuersatz, setSteuersatz] = useState(42);
      const [wertsteigerung, setWertsteigerung] = useState(2.0);
      const [haltedauer, setHaltedauer] = useState(20);

      const calc = useMemo(() => {
        const nk_gew = kaufpreis * grunderwerbsteuer / 100;
        const nk_notar = kaufpreis * notarkosten / 100;
        const nk_makler = kaufpreis * maklercourtage / 100;
        const gesamtNebenkosten = nk_gew + nk_notar + nk_makler;
        const gesamtInvestition = kaufpreis + gesamtNebenkosten;
        const nebenkostenProzent = gesamtNebenkosten / kaufpreis * 100;
        const darlehen = gesamtInvestition - eigenkapital;
        const jahreszins = darlehen * zinssatz / 100;
        const jahrestilgung = darlehen * tilgung / 100;
        const jahresrate = jahreszins + jahrestilgung;
        const monatsrate = jahresrate / 12;
        const jahreskaltmiete = kaltmiete * 12;
        const mietausfall = jahreskaltmiete * mietausfallWagnis / 100;
        const effektiveMiete = jahreskaltmiete - mietausfall;
        const jVerwaltung = verwaltungskosten * 12;
        const jInstandhaltung = instandhaltung * wohnflaeche;
        const jNichtUmlegbar = nichtUmlegbar * 12;
        const gesamtKosten = jVerwaltung + jInstandhaltung + jNichtUmlegbar;
        const noi = effektiveMiete - gesamtKosten;
        const cashflowNachFinanzierung = noi - jahresrate;
        const bruttorendite = jahreskaltmiete / kaufpreis * 100;
        const nettorendite = noi / gesamtInvestition * 100;
        const kaufpreisfaktor = kaufpreis / jahreskaltmiete;
        const gebaeudewert = kaufpreis * gebaeudewertAnteil / 100;
        let afaSatz = 2;
        if (isNeubau) afaSatz = isQNG ? 5 : 3;
        const jAfA = gebaeudewert * afaSatz / 100;
        const steuerersparnis = jAfA * steuersatz / 100;
        const zvE_Immobilie = noi - jahreszins - jAfA;
        const steuerLastImmo = zvE_Immobilie > 0 ? zvE_Immobilie * steuersatz / 100 : 0;
        const cashflowNachSteuer = cashflowNachFinanzierung - steuerLastImmo + (zvE_Immobilie < 0 ? Math.abs(zvE_Immobilie) * steuersatz / 100 : 0);
        const ekRendite = (cashflowNachSteuer + jahrestilgung) / Math.max(eigenkapital, 1) * 100;
        const endwertImmobilie = kaufpreis * Math.pow(1 + wertsteigerung / 100, haltedauer);
        const restschuld0 = Math.max(0, darlehen - jahrestilgung * haltedauer);
        const eigenkapitalendwert = endwertImmobilie - restschuld0;
        const gesamtMiete = mietsteigerung > 0
          ? jahreskaltmiete * ((Math.pow(1 + mietsteigerung / 100, haltedauer) - 1) / (mietsteigerung / 100))
          : jahreskaltmiete * haltedauer;

        let restschuldArr = [], zinsenArr = [], tilgungArr = [], mietArr = [], kostenArr = [], cashflowArr = [], vermoegenArr = [];
        let rs = darlehen;
        for (let y = 1; y <= haltedauer; y++) {
          const zins = rs * zinssatz / 100;
          const til = jahrestilgung;
          rs = Math.max(0, rs - til);
          const miete = jahreskaltmiete * Math.pow(1 + mietsteigerung / 100, y - 1);
          const kosten = gesamtKosten;
          const cf = miete * (1 - mietausfallWagnis / 100) - kosten - zins - til;
          const immowert = kaufpreis * Math.pow(1 + wertsteigerung / 100, y);
          restschuldArr.push(rs);
          zinsenArr.push(zins);
          tilgungArr.push(til);
          mietArr.push(miete);
          kostenArr.push(kosten + zins + til);
          cashflowArr.push(cf);
          vermoegenArr.push(immowert - rs);
        }

        const afaVarianten = [
          { name: "Bestand", satz: 2, para: "§ 7 Abs.4 EStG", dauer: 50, color: "#4fc3f7", desc: "Standardsatz für Bestandsgebäude (Baujahr ≥1925)" },
          { name: "Neubau (ab 2023)", satz: 3, para: "§ 7 Abs.4 EStG", dauer: 33, color: "#a78bfa", desc: "Erhöhter Satz für Neubauten ab Baujahr 2023" },
          { name: "QNG-Neubau (§7b)", satz: 5, para: "§ 7b EStG", dauer: 10, color: "#4ade80", desc: "Sonderabschreibung mit QNG-Siegel, 10 Jahre 5%, danach 2%" },
          { name: "Denkmal (§7i)", satz: 9, para: "§ 7i EStG", dauer: 8, color: "#fb923c", desc: "9% p.a. 8 Jahre, dann 7% p.a. 4 Jahre auf Sanierungskosten" },
        ];

        const afaKumuliert = afaVarianten.map((v) => {
          let kum = 0;
          return Array.from({ length: haltedauer }, (_, y) => {
            let afaJ;
            if (v.name.startsWith("QNG")) afaJ = y < 10 ? gebaeudewert * 0.05 : gebaeudewert * 0.02;
            else if (v.name.startsWith("Denkmal")) afaJ = y < 8 ? gebaeudewert * 0.09 : y < 12 ? gebaeudewert * 0.07 : gebaeudewert * 0.02;
            else afaJ = gebaeudewert * v.satz / 100;
            kum += afaJ;
            return Math.min(kum, gebaeudewert);
          });
        });

        return {
          nk_gew, nk_notar, nk_makler, gesamtNebenkosten, gesamtInvestition, nebenkostenProzent,
          darlehen, jahreszins, jahrestilgung, jahresrate, monatsrate,
          jahreskaltmiete, mietausfall, effektiveMiete,
          jVerwaltung, jInstandhaltung, jNichtUmlegbar, gesamtKosten,
          noi, cashflowNachFinanzierung, cashflowNachSteuer,
          bruttorendite, nettorendite, kaufpreisfaktor,
          jAfA, afaSatz, steuerersparnis, ekRendite, gebaeudewert,
          endwertImmobilie, restschuld: restschuld0, eigenkapitalendwert, gesamtMiete,
          afaVarianten, afaKumuliert,
          years: Array.from({ length: haltedauer }, (_, i) => i + 1),
          restschuldArr, zinsenArr, tilgungArr, mietArr, kostenArr, cashflowArr, vermoegenArr,
        };
      }, [kaufpreis, grunderwerbsteuer, notarkosten, maklercourtage, wohnflaeche,
          eigenkapital, zinssatz, tilgung, zinsbindung, kaltmiete, mietausfallWagnis, mietsteigerung,
          verwaltungskosten, instandhaltung, nichtUmlegbar, isNeubau, isQNG, gebaeudewertAnteil, steuersatz,
          wertsteigerung, haltedauer]);

      const score = useMemo(() => {
        let s = 0;
        if (calc.bruttorendite >= 5) s += 25; else if (calc.bruttorendite >= 4) s += 15; else if (calc.bruttorendite >= 3) s += 5;
        if (calc.cashflowNachSteuer > 0) s += 25; else if (calc.cashflowNachSteuer > -2000) s += 10;
        if (calc.ekRendite >= 8) s += 25; else if (calc.ekRendite >= 5) s += 15; else if (calc.ekRendite >= 2) s += 5;
        if (calc.kaufpreisfaktor <= 20) s += 25; else if (calc.kaufpreisfaktor <= 25) s += 15; else if (calc.kaufpreisfaktor <= 30) s += 5;
        return Math.min(100, s);
      }, [calc]);

      const scoreColor = score >= 70 ? "#4ade80" : score >= 45 ? "#facc15" : "#f87171";
      const scoreLabel = score >= 70 ? "Attraktiv" : score >= 45 ? "Solide" : "Kritisch";
      const yearsLabels = calc.years.map(y => `J${y}`);

      const tabs = [
        { id: "uebersicht", label: "📋 Übersicht" },
        { id: "abschreibung", label: "📊 Abschreibung" },
        { id: "kosten", label: "📈 Kostenentwicklung" },
      ];

      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(160deg, #070f1a 0%, #0a1828 50%, #0c1e30 100%)", fontFamily: "'DM Sans', sans-serif", color: "#e8f4fd" }}>
          {/* Header */}
          <div style={{ background: "linear-gradient(90deg, #0d2137 0%, #0a1828 100%)", borderBottom: "1px solid rgba(79,195,247,0.15)", padding: "18px 28px", display: "flex", alignItems: "center", gap: "16px" }}>
            <span style={{ fontSize: "26px" }}>🏢</span>
            <div>
              <h1 style={{ margin: 0, fontFamily: "'DM Serif Display', serif", fontSize: "20px", color: "#e8f4fd", fontWeight: "400" }}>
                Immobilien<span style={{ color: "#4fc3f7" }}>rendite</span>rechner
              </h1>
              <p style={{ margin: 0, fontSize: "11px", color: "#5a6e82", letterSpacing: "0.06em" }}>KAPITALANLAGE · CASHFLOW · STEUER · LANGFRISTANALYSE</p>
            </div>
            <div style={{ marginLeft: "auto", textAlign: "center", background: "rgba(255,255,255,0.03)", border: `2px solid ${scoreColor}`, borderRadius: "12px", padding: "8px 18px", boxShadow: `0 0 20px ${scoreColor}30` }}>
              <div style={{ fontSize: "26px", fontWeight: "700", color: scoreColor, fontFamily: "'DM Serif Display', serif", lineHeight: 1 }}>{score}</div>
              <div style={{ fontSize: "10px", color: scoreColor, letterSpacing: "0.1em", textTransform: "uppercase" }}>{scoreLabel}</div>
            </div>
          </div>

          <div style={{ display: "flex", maxWidth: "1500px", margin: "0 auto" }}>
            {/* Sidebar */}
            <div style={{ width: "356px", flexShrink: 0, padding: "22px 18px", borderRight: "1px solid rgba(255,255,255,0.05)", overflowY: "auto", maxHeight: "calc(100vh - 70px)" }}>
              <Section title="Kaufpreis & Nebenkosten" icon="🏷️">
                <Slider label="Kaufpreis" value={kaufpreis} min={50000} max={2000000} step={5000} unit="€" onChange={setKaufpreis} />
                <Slider label="Wohnfläche" value={wohnflaeche} min={20} max={400} step={5} unit="m²" onChange={setWohnflaeche} hint={`→ ${fmtEur(kaufpreis/wohnflaeche,0)}/m²`} />
                <Slider label="Grunderwerbsteuer" value={grunderwerbsteuer} min={3.5} max={6.5} step={0.5} unit="%" onChange={setGrunderwerbsteuer} hint="Je nach Bundesland 3,5%–6,5%" />
                <Slider label="Notar & Grundbuch" value={notarkosten} min={0.5} max={2.5} step={0.1} unit="%" onChange={setNotarkosten} />
                <Slider label="Maklercourtage" value={maklercourtage} min={0} max={7.14} step={0.1} unit="%" onChange={setMaklercourtage} />
              </Section>
              <Section title="Finanzierung" icon="🏦">
                <Slider label="Eigenkapital" value={eigenkapital} min={0} max={kaufpreis * 1.15} step={5000} unit="€" onChange={setEigenkapital} hint={`Beleihung: ${fmt((1 - eigenkapital / calc.gesamtInvestition) * 100, 1)}%`} />
                <Slider label="Sollzinssatz" value={zinssatz} min={1} max={8} step={0.1} unit="%" onChange={setZinssatz} />
                <Slider label="Anfangstilgung" value={tilgung} min={0.5} max={5} step={0.25} unit="%" onChange={setTilgung} />
                <Slider label="Zinsbindung" value={zinsbindung} min={5} max={30} step={5} unit="Jahre" onChange={setZinsbindung} />
              </Section>
              <Section title="Mieteinnahmen" icon="💰">
                <Slider label="Kaltmiete / Monat" value={kaltmiete} min={200} max={10000} step={50} unit="€" onChange={setKaltmiete} hint={`→ ${fmtEur(kaltmiete/wohnflaeche,2)}/m²`} />
                <Slider label="Mietausfallwagnis" value={mietausfallWagnis} min={0} max={10} step={0.5} unit="%" onChange={setMietausfallWagnis} />
                <Slider label="Jährl. Mietsteigerung" value={mietsteigerung} min={0} max={5} step={0.1} unit="%" onChange={setMietsteigerung} />
              </Section>
              <Section title="Bewirtschaftungskosten" icon="🔧" collapsible>
                <Slider label="Verwaltungskosten" value={verwaltungskosten} min={0} max={200} step={5} unit="€/Mo" onChange={setVerwaltungskosten} />
                <Slider label="Instandhaltung" value={instandhaltung} min={0} max={30} step={0.5} unit="€/m²/J" onChange={setInstandhaltung} hint="Peters: ~8–12 €/m²" />
                <Slider label="Nicht umlegbare NK" value={nichtUmlegbar} min={0} max={500} step={10} unit="€/Mo" onChange={setNichtUmlegbar} />
              </Section>
              <Section title="Abschreibung & Steuer" icon="📊">
                <Toggle label="Neubau (ab 2023)" value={isNeubau} onChange={setIsNeubau} />

                        const pct = total > 0 ? item.val / total * 100 : 0;
                        return (
                          <div key={i} style={{ flex: "1 1 140px", background: "rgba(0,0,0,0.2)", borderRadius: "10px", padding: "11px" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "4px" }}>
                              <span style={{ fontSize: "11px", color: item.color, fontWeight: "600" }}>{item.label}</span>
                              <span style={{ fontSize: "10px", color: "#5a6e82" }}>{fmt(pct, 1)}%</span>
                            </div>
                            <div style={{ fontSize: "17px", fontWeight: "700", color: "#e8f4fd", fontFamily: "'DM Serif Display', serif" }}>{fmtEur(item.val)}</div>
                            <div style={{ height: "4px", background: "rgba(255,255,255,0.05)", borderRadius: "2px", marginTop: "7px", overflow: "hidden" }}>
                              <div style={{ height: "100%", width: `${pct}%`, background: item.color, borderRadius: "2px", transition: "width 0.4s" }} />
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <p style={{ margin: "14px 0 0 0", fontSize: "11px", color: "#3d5266", lineHeight: "1.6" }}>
                      ⚠️ Vereinfachte Modellrechnung. Zinsanteil sinkt mit der Restschuld (lineare Tilgung). Bei echten Annuitätendarlehen bleibt die Rate konstant. Für verbindliche Berechnungen Steuerberater/Finanzberater hinzuziehen.
                    </p>
                  </div>
                </>}

              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ImmobilienRechner />);
  </script>
</body>
</html>
